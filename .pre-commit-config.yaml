repos:
  - repo: local
    hooks:
      - id: manifest-integrity
        name: manifest-integrity
        entry: python tools/verify_manifest.py MANIFEST.json .
        language: system
        pass_filenames: false
      - id: schema-valid-acceptance
        name: schema-valid-acceptance
        entry: bash -lc 'python tools/validate_json.py schemas/canonical-artifact.schema.json tests/fixtures/artifact.valid.json && python tools/validate_json.py schemas/evaluation-result.schema.json tests/fixtures/evaluation-result.valid.json'
        language: system
        pass_filenames: false
      - id: schema-invalid-rejection
        name: schema-invalid-rejection
        entry: bash -lc 'python tools/validate_json.py schemas/canonical-artifact.schema.json tests/fixtures/artifact.invalid.missing-valid-fingerprint.json >/dev/null 2>&1 && exit 1 || true; python tools/validate_json.py schemas/evaluation-result.schema.json tests/fixtures/evaluation-result.invalid.bad-gate.json >/dev/null 2>&1 && exit 1 || true'
        language: system
        pass_filenames: false
      - id: schema-valid-evaluation-acceptance
        name: schema-valid-evaluation-acceptance
        entry: python tools/validate_json.py schemas/evaluation-result.schema.json tests/fixtures/evaluation-result.valid.json
        language: system
        pass_filenames: false
      - id: schema-invalid-evaluation-rejection
        name: schema-invalid-evaluation-rejection
        entry: bash -lc 'python tools/validate_json.py schemas/evaluation-result.schema.json tests/fixtures/evaluation-result.invalid.bad-gate.json >/dev/null 2>&1 && exit 1 || true'
        language: system
        pass_filenames: false
      - id: governance-registry-schema
        name: governance-registry-schema
        entry: python tools/validate_json.py schemas/governance-invariant-registry.schema.json governance/invariant-registry.json
        language: system
        pass_filenames: false
      - id: governance-checklist-render
        name: governance-checklist-render
        entry: bash -lc 'python tools/render_governance_checklist.py && git diff --exit-code -- docs/PR_PREMERGE_ENGINEERING_CHECKLIST.md'
        language: system
        pass_filenames: false
      - id: dependency-hermeticity
        name: dependency-hermeticity
        entry: python tools/check_dependency_hermeticity.py
        language: system
        pass_filenames: false
      - id: governance-cli-contracts
        name: governance-cli-contracts
        entry: python tools/check_cli_contracts.py
        language: system
        pass_filenames: false
      - id: governance-nondeterminism
        name: governance-nondeterminism
        entry: python tools/check_governance_nondeterminism.py
        language: system
        pass_filenames: false
      - id: governance-local-baseline
        name: governance-local-baseline
        entry: python tools/run_local_governance_baseline.py
        language: system
        pass_filenames: false
      - id: execution-chain-verify
        name: execution-chain-verify
        entry: python tools/verify_execution_chain.py --input examples/worked-example/SE_WORKED_EXAMPLE_INPUT.json --result /tmp/SE_WORKED_EXAMPLE_OUTPUT.check.json
        language: system
        pass_filenames: false
      - id: worked-example-run
        name: worked-example-run
        entry: python tools/reference_runner.py examples/worked-example/SE_WORKED_EXAMPLE_INPUT.json --output /tmp/SE_WORKED_EXAMPLE_OUTPUT.check.json
        language: system
        pass_filenames: false
      - id: benchmark-run
        name: benchmark-run
        entry: python benchmark/benchmark_runner.py
        language: system
        pass_filenames: false
      - id: compile-sanity
        name: compile-sanity
        entry: python -m compileall tools benchmark pcos
        language: system
        pass_filenames: false
      - id: governance-self-integrity
        name: governance-self-integrity
        entry: python tools/validate_governance.py
        language: system
        pass_filenames: false
